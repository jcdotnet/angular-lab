<h2>Cities</h2>

<div class="flex">
	<div class="flex-1">
		<div class="table-container">
			<table class="table w-100" [formGroup]="citiesForm">
				<thead>
					<tr>
						<th>#</th>
						<th>Name</th>
					</tr>
				</thead>
				<tbody formArrayName="cities">
					@for (city of cities(); track city.id; let idx = $index) {
					<tr>
						<td>{{ idx + 1}}</td>
						<td [formGroupName]="idx">
							<input type="text" formControlName="name"
								[ngClass]="{ 'borderless-textbox': city.id != editCityId, 'form-input': city.id == editCityId }"
								[disableControl]="city.id != editCityId" />
						</td>

						<td style="width:200px">
							@if (city.id != editCityId) {
							<button class="button button-blue-back" (click)="onEdit(city)">Edit</button>
							<button class="button button-red-back ml" (click)="onDelete(city, idx)">Delete</button>
							} @else {
							<button class="button button-blue-back" (click)="onUpdate(idx)">Update</button>
							}
						</td>
					</tr>
					}
				</tbody>
			</table>
		</div>
		<button type="button" class="button button-blue-back mt" (click)="onRefresh()">Refresh</button>
	</div>

	<div class="flex-1 w-50">

		<div class="form-container">
			<h3>Create City</h3>

			<form [formGroup]="cityForm" (ngSubmit)="onSubmit()">

				<div class="form-field flex">
					<div class="w-25">
						<label for="name" class="form-label pt">City Name</label>
					</div>

					<div class="flex-1">
						<input type="text" class="form-input" id="name" formControlName="name" autocomplete="on" />
						@if ((cityForm.touched || cityFormSubmitted) &&
						(cityForm.controls['name'].errors?.['required']))
						{
						<span class="text-red">The city name is required</span>
						}
					</div>
				</div>


				<div class="form-field flex">
					<div class="w-25"></div>

					<div class="flex-1">
						<button class="button button-green-back">Create</button>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>
